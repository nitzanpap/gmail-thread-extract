<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gmail Thread Extractor</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        width: 260px;
        margin: 0;
        padding: 16px;
        font: 13px/1.4 "Google Sans", Roboto, Arial, sans-serif;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 14px;
      }
      button {
        width: 100%;
        padding: 10px 12px;
        border: none;
        border-radius: 8px;
        background: #1a73e8;
        color: #fff;
        font: 600 13px/1 inherit;
        cursor: pointer;
      }
      button:disabled {
        background: #9aa0a6;
        cursor: default;
      }
      #hint {
        margin: 8px 0 0;
        min-height: 1em;
        color: #5f6368;
        font-size: 12px;
      }
      .setting {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 16px;
        padding-top: 12px;
        border-top: 1px solid rgba(128, 128, 128, 0.3);
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <h1>Gmail Thread Extractor</h1>
    <button id="extract" type="button">Extract current thread</button>
    <p id="hint"></p>
    <label class="setting">
      <input id="toggle" type="checkbox" />
      Show floating button in Gmail
    </label>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
